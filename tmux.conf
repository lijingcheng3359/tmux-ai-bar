# ---- AI-agent status: yellow=active output, red=stopped (review), default=idle ----
#
# State machine:
# 1. @active=1 when history grows within 8s -> yellow
# 2. @done=1 when active -> silent transition -> red (inactive windows only)
# 3. Switching to a window auto-clears @done (session-window-changed hook)
# Maintained by ~/.tmux/agent-poll.sh background poller (every 2s).

# Start background poller (dedupe via pgrep)
run-shell -b "pgrep -f agent-poll.sh > /dev/null 2>&1 || ~/.tmux/agent-poll.sh > /dev/null 2>&1 &"

# Bell counts as "done" (Claude Code often rings bell on completion)
set -g monitor-bell on
set -g bell-action other
# Unset before set to prevent hook duplication on reload
set-hook -gu alert-bell
set-hook -g alert-bell 'set-window-option @done 1'

# Switching to a window = reviewed -> clear @done
set-hook -gu session-window-changed
set-hook -g session-window-changed 'set-window-option @done 0'

# Terminal true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Status bar
# Redraws every 2s; poller samples every 2s, so worst-case visibility delay is 2s
set -g status-interval 2
set -g status-position top
set -g status-justify left
set -g status-style 'bg=default,fg=default'
set -g window-status-separator ''
set -g status-left ''
set -g status-left-length 0
# Right side: current pane path with ~ substitution, truncated to 50 chars
set -g status-right '#{=-50:#{s|^/Users/[^/]+|~|:pane_current_path}} '
set -g status-right-length 60
# Literal "default" is a magic value that skips tmux's default reverse override
set -g window-status-activity-style default
set -g window-status-bell-style default

# Agent marker: poller detects agent type and sets @agent_marker per window.
# Displayed after window index: "0C" / "1H" / "2Q" / "3"

# Visual rules:
#   Inactive windows: 1-space padding on each side
#   Current window: prefixed with the strawberry emoji as "you are here" indicator
#   Status color (yellow/red) fills the entire tab block

# Inactive: @active -> yellow; @done -> red; else -> default
set -g window-status-format '#{?#{==:#{E:@active},1},#[fg=black#,bg=#ffcc00#,bold] [#I:#{b:pane_current_path}#{?#{E:@agent_marker},#{E:@agent_marker} ,}] #[default],#{?#{==:#{E:@done},1},#[fg=black#,bg=#ff3b30#,bold] [#I:#{b:pane_current_path}#{?#{E:@agent_marker},#{E:@agent_marker} ,}] #[default], [#I:#{b:pane_current_path}#{?#{E:@agent_marker},#{E:@agent_marker} ,}] }}'

# Current window: strawberry emoji prefix (2 columns wide, replaces left padding)
set -g window-status-current-format '#{?#{==:#{E:@active},1},#[fg=black#,bg=#ffcc00#,bold]🍓[#I:#{b:pane_current_path}#{?#{E:@agent_marker},#{E:@agent_marker} ,}] #[default],#[bold]🍓[#I:#{b:pane_current_path}#{?#{E:@agent_marker},#{E:@agent_marker} ,}] #[default]}'

# Prefix: Ctrl+J instead of default Ctrl+B
# Note: Ctrl+J = LF. Most terminals send CR (Ctrl+M) for Enter, so no conflict.
# However, vim command mode or some SSH setups may treat Enter as Ctrl+J.
unbind C-b
set -g prefix C-j
bind C-j send-prefix

# QoL
set -g history-limit 50000
set -g mouse on
setw -g mode-keys vi
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on

# Manual reset / reload
bind r run-shell 'tmux setw @active 0; tmux setw @done 0; tmux setw @was_active 0; tmux setw @silent_count 0; tmux setw @growth_streak 0' \; display 'reset'
bind R source-file ~/.tmux.conf \; display 'tmux.conf reloaded'
