# ---- AI-agent status: yellow=active output, red=stopped (review), default=idle ----
#
# 设计：纯内容（history_size）判定，针对 CC/Hermes 这类 agent 优化
# 1. @active=1 ↔ history 8s 内增长过 → 黄
# 2. @done=1 ↔ active → silent 过渡 → 红（仅 inactive）
# 3. 切到 window 自动清 @done（session-window-changed）
# 状态机由 ~/.tmux/agent-poll.sh 后台维护，每 1 秒 poll 一次。

# 启动后台 poller（dedupe via pgrep）
run-shell -b "pgrep -f agent-poll.sh > /dev/null 2>&1 || ~/.tmux/agent-poll.sh > /dev/null 2>&1 &"

# Bell 也算"done"（CC 完成时常响铃）
set -g monitor-bell on
set -g bell-action other
# 用 -u 先 unset 再 -g set，防止 reload 时 -a (append) 累积成 N 份 hook
set-hook -gu alert-bell
set-hook -g alert-bell 'set-window-option @done 1'

# 切到 window = review → 清 @done
set-hook -gu session-window-changed
set-hook -g session-window-changed 'set-window-option @done 0'

# Terminal true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Status bar
# 2 秒重画一次 status；poller 仍每秒采样，状态变化最坏延迟 2 秒可见
set -g status-interval 2
set -g status-position top
set -g status-justify left
set -g status-style 'bg=default,fg=default'
set -g window-status-separator ''
# 左侧不显示任何东西；右侧只显示 session 名（无方括号）
set -g status-left ''
set -g status-left-length 0
# 右侧显示当前 pane 的路径，把 /Users/<name> 替换成 ~，太长截尾保留
set -g status-right '#{=-50:#{s|^/Users/[^/]+|~|:pane_current_path}} '
set -g status-right-length 60
# 字面 default 是魔法值，跳过 tmux 默认的 reverse 覆盖
set -g window-status-activity-style default
set -g window-status-bell-style default

# Agent marker：poller 检测到 CC → Ⓒ，hermes → Ⓗ，qodercli → Ⓠ，普通 shell → 空。
# 用 #{E:@agent_marker} 嵌在 #I 后，自然显示为 "0Ⓒ" / "1Ⓗ" / "2Ⓠ" / "3"

# 视觉规则：
#   Inactive 用两边各 1 空格：" 0 " / " 0C "（3/4 列宽）
#   Current 用 🍓 前置标记：" 🍓0" / "🍓0C"（emoji 占 2 列 + 数字 = 3/4 列宽，width 一致不抖动）
#   状态色（黄/红）仍然填满整个 tab 块

# Inactive: @active → 黄；@done → 红；else → 默认（紧凑 padding，左右各 1 空格）
set -g window-status-format '#{?#{==:#{E:@active},1},#[fg=black#,bg=#ffcc00#,bold] [#I:#{b:pane_current_path}#{?#{E:@agent_marker},#{E:@agent_marker} ,}] #[default],#{?#{==:#{E:@done},1},#[fg=black#,bg=#ff3b30#,bold] [#I:#{b:pane_current_path}#{?#{E:@agent_marker},#{E:@agent_marker} ,}] #[default], [#I:#{b:pane_current_path}#{?#{E:@agent_marker},#{E:@agent_marker} ,}] }}'

# Current: 用 🍓 前置作为"你在这"的标记，emoji 占 2 列正好顶替左侧空格
set -g window-status-current-format '#{?#{==:#{E:@active},1},#[fg=black#,bg=#ffcc00#,bold]🍓[#I:#{b:pane_current_path}#{?#{E:@agent_marker},#{E:@agent_marker} ,}] #[default],#[bold]🍓[#I:#{b:pane_current_path}#{?#{E:@agent_marker},#{E:@agent_marker} ,}] #[default]}'

# Prefix: Ctrl+J 代替默认 Ctrl+B
# 注意：Ctrl+J = LF 换行符。多数终端 Enter 发的是 CR (Ctrl+M)，不冲突，
# 但 vim 命令模式 / 某些 ssh 场景可能把 Enter 当成 Ctrl+J，会误触发 prefix
unbind C-b
set -g prefix C-j
bind C-j send-prefix    # 想发字面 Ctrl+J 给应用：按两次 (Ctrl+J Ctrl+J)

# QoL
set -g history-limit 50000
set -g mouse on
setw -g mode-keys vi
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on

# Manual reset / reload
bind r run-shell 'tmux setw @active 0; tmux setw @done 0; tmux setw @was_active 0; tmux setw @silent_count 0; tmux setw @growth_streak 0' \; display 'reset'
bind R source-file ~/.tmux.conf \; display 'tmux.conf reloaded'
